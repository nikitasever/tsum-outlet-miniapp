<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TSUM Outlet</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F5;
    --surface: #FFFFFF;
    --surface-alt: #F3F0EB;
    --gold: #C4A265;
    --gold-light: #D4B87A;
    --gold-dark: #A8873F;
    --charcoal: #1A1A1A;
    --text: #2C2C2C;
    --text-secondary: #8C8580;
    --text-muted: #B5AFA8;
    --border: #E8E3DC;
    --border-light: #F0EDE8;
    --red: #D4463B;
    --red-bg: #FDF0EF;
    --green: #2D9F5B;
    --green-bg: #EDF8F1;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);
    --shadow-card: 0 2px 8px rgba(0,0,0,0.04), 0 0 1px rgba(0,0,0,0.08);
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --bottom-nav-h: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 8px);
    -webkit-font-smoothing: antialiased;
  }

  /* ═══════ HEADER ═══════ */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.88);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: var(--safe-top) 20px 0;
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--charcoal);
  }
  .logo span { color: var(--gold); font-weight: 500; }
  .header-icon {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: var(--surface-alt);
    transition: background 0.2s;
  }
  .header-icon:active { background: var(--border); }

  /* ═══════ SEARCH ═══════ */
  .search-wrap { padding: 0 20px 14px; }
  .search-box {
    position: relative;
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: 14px;
    transition: all 0.25s;
    box-shadow: var(--shadow-sm);
  }
  .search-box:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(196,162,101,0.12), var(--shadow-sm);
  }
  .search-box input {
    width: 100%;
    background: transparent;
    border: none;
    padding: 12px 44px 12px 44px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    outline: none;
  }
  .search-box input::placeholder { color: var(--text-muted); font-weight: 300; }
  .search-box .s-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }
  .search-box .s-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: var(--surface-alt); color: var(--text-secondary);
    font-size: 13px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
  }
  .search-box .s-clear.visible { display: flex; }

  /* ═══════ BOTTOM NAV ═══════ */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--border);
    padding-bottom: var(--safe-bottom);
    display: flex;
    height: calc(var(--bottom-nav-h) + var(--safe-bottom));
  }
  .nav-item {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    background: none; border: none;
    cursor: pointer;
    transition: color 0.2s;
    padding: 6px 0;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item svg { transition: transform 0.2s; }
  .nav-item.active { color: var(--gold); }
  .nav-item.active svg { transform: scale(1.08); }
  .nav-item .nav-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold); opacity: 0;
    transition: opacity 0.2s;
    margin-top: 1px;
  }
  .nav-item.active .nav-dot { opacity: 1; }

  /* ═══════ SCREENS ═══════ */
  .screen { display: none; padding: 16px 16px 24px; }
  .screen.active { display: block; animation: screenIn 0.3s ease; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ═══════ SECTION ═══════ */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 16px;
    color: var(--charcoal);
  }
  .section-title em { font-style: italic; color: var(--gold); }
  .section-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }

  /* ═══════ CHIPS ═══════ */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    white-space: nowrap;
    padding: 8px 18px;
    border-radius: var(--radius-xl);
    font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: var(--shadow-sm);
  }
  .chip:active { transform: scale(0.95); }
  .chip.active {
    background: var(--charcoal);
    color: #fff;
    border-color: var(--charcoal);
    box-shadow: 0 4px 12px rgba(26,26,26,0.2);
  }

  /* ═══════ SORT ═══════ */
  .sort-bar {
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; scrollbar-width: none;
    margin-bottom: 14px; margin: 0 -16px 14px; padding: 0 16px;
  }
  .sort-bar::-webkit-scrollbar { display: none; }
  .sort-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; font-weight: 500; margin-right: 2px; }
  .sort-btn {
    white-space: nowrap; padding: 6px 14px;
    border-radius: var(--radius-xl);
    font-size: 11px; font-weight: 500;
    border: 1px solid var(--border-light);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer; transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .sort-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); box-shadow: 0 2px 8px rgba(196,162,101,0.3); }

  /* ═══════ PRODUCT GRID ═══════ */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .card {
    background: var(--surface);
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    box-shadow: var(--shadow-card);
    animation: fadeUp 0.4s ease both;
    transition: transform 0.2s, box-shadow 0.2s;
    border: none;
  }
  .card:active { transform: scale(0.97); box-shadow: var(--shadow-sm); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    background: linear-gradient(145deg, var(--surface-alt) 0%, var(--border-light) 100%);
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
    opacity: 0;
  }
  .card-img-wrap img.loaded { opacity: 1; }

  .img-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--border);
  }

  .badge {
    position: absolute; top: 10px; left: 10px;
    font-size: 10px; font-weight: 600;
    padding: 4px 9px; border-radius: 6px;
    letter-spacing: 0.02em;
  }
  .badge-sale { background: var(--red); color: #fff; }
  .badge-coming { background: var(--gold); color: #fff; }
  .badge-sold { background: var(--charcoal); color: #fff; }

  .fav-btn {
    position: absolute; top: 10px; right: 10px;
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-size: 15px;
  }
  .fav-btn:active { transform: scale(1.25); }
  .fav-btn.is-tracked { color: var(--red); }

  .card-body { padding: 12px 12px 14px; }
  .card-brand {
    font-family: 'Playfair Display', serif;
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--charcoal);
  }
  .card-name {
    font-size: 10px; color: var(--text-muted);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 300;
  }
  .card-prices { display: flex; align-items: baseline; gap: 6px; margin-top: 10px; }
  .price-new { font-size: 14px; font-weight: 700; color: var(--charcoal); }
  .price-old { font-size: 10px; color: var(--text-muted); text-decoration: line-through; font-weight: 400; }
  .card-stats { font-size: 10px; color: var(--text-secondary); margin-top: 6px; font-weight: 400; }

  /* ═══════ RESULT COUNT ═══════ */
  .result-count {
    font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
    font-weight: 400;
  }

  /* ═══════ SKELETON ═══════ */
  .skeleton-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .skeleton-card { background: var(--surface); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-card); }
  .skeleton-img { aspect-ratio: 3/4; background: linear-gradient(110deg, var(--surface-alt) 8%, #f0ede8 18%, var(--surface-alt) 33%); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
  .skeleton-body { padding: 12px; }
  .skeleton-line { height: 10px; border-radius: 5px; background: linear-gradient(110deg, var(--surface-alt) 8%, #f0ede8 18%, var(--surface-alt) 33%); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; margin-bottom: 8px; }
  .skeleton-line.short { width: 55%; }
  .skeleton-line.price { width: 35%; height: 14px; margin-top: 4px; }
  @keyframes shimmer { to { background-position-x: -200%; } }

  /* ═══════ MODAL ═══════ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    animation: modalUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    -webkit-overflow-scrolling: touch;
  }
  @keyframes modalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    display: flex; justify-content: center; padding: 12px 0 4px;
    cursor: grab; position: sticky; top: 0; z-index: 2;
  }
  .modal-handle-bar { width: 40px; height: 4px; background: var(--border); border-radius: 2px; }

  .modal-img-wrap { position: relative; }
  .modal-img {
    width: 100%; aspect-ratio: 3/4;
    object-fit: cover;
    background: linear-gradient(145deg, var(--surface-alt), var(--border-light));
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%; border: none; cursor: pointer;
    font-size: 16px; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }
  .modal-close:active { transform: scale(0.9); }

  .modal-body { padding: 24px 20px calc(32px + var(--safe-bottom)); }
  .modal-brand {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 600;
    color: var(--charcoal);
    letter-spacing: 0.04em;
  }
  .modal-name { font-size: 14px; color: var(--text-secondary); margin-top: 4px; font-weight: 300; }

  .modal-price-row {
    display: flex; align-items: center; gap: 12px;
    margin-top: 20px; flex-wrap: wrap;
  }
  .modal-price-new { font-size: 28px; font-weight: 700; color: var(--charcoal); }
  .modal-price-old { font-size: 17px; color: var(--text-muted); text-decoration: line-through; font-weight: 400; }
  .modal-discount-tag {
    display: inline-flex; padding: 4px 10px;
    border-radius: 6px; font-size: 12px; font-weight: 600;
    background: var(--red-bg); color: var(--red);
  }

  .modal-avail {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; margin-top: 12px;
    padding: 6px 12px; border-radius: 8px;
  }
  .modal-avail.yes { background: var(--green-bg); color: var(--green); }
  .modal-avail.no { background: var(--surface-alt); color: var(--text-muted); }
  .modal-avail.soon { background: #FFF8EC; color: var(--gold-dark); }
  .modal-avail-dot { width: 6px; height: 6px; border-radius: 50%; }
  .modal-avail.yes .modal-avail-dot { background: var(--green); }
  .modal-avail.no .modal-avail-dot { background: var(--text-muted); }
  .modal-avail.soon .modal-avail-dot { background: var(--gold); }

  .modal-sizes { margin-top: 16px; }
  .modal-sizes-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 8px; }
  .modal-sizes-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .size-tag { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); }

  .modal-divider { height: 1px; background: var(--border-light); margin: 24px 0; }

  .modal-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-primary {
    width: 100%; padding: 16px;
    background: var(--charcoal);
    color: #fff; border: none;
    border-radius: var(--radius-md);
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer; text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(26,26,26,0.15);
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-secondary {
    width: 100%; padding: 15px;
    background: transparent;
    color: var(--charcoal);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-secondary:active { transform: scale(0.98); background: var(--surface-alt); }
  .btn-secondary.tracked { border-color: var(--gold); color: var(--gold); background: #FFF8EC; }

  /* ═══════ TRACKED LIST ═══════ */
  .tracked-item {
    display: flex; gap: 14px;
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    animation: fadeUp 0.35s ease both;
    transition: transform 0.2s, opacity 0.3s;
    box-shadow: var(--shadow-card);
  }
  .tracked-item:active { transform: scale(0.98); }
  .tracked-img {
    width: 76px; height: 100px;
    object-fit: cover;
    border-radius: var(--radius-sm);
    background: var(--surface-alt);
    flex-shrink: 0;
  }
  .tracked-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .tracked-brand { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--charcoal); }
  .tracked-name { font-size: 11px; color: var(--text-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; }
  .tracked-prices { display: flex; align-items: baseline; gap: 8px; margin-top: auto; }
  .tracked-price { font-size: 16px; font-weight: 700; color: var(--charcoal); }
  .tracked-old-price { font-size: 12px; color: var(--text-muted); text-decoration: line-through; }
  .tracked-discount-tag {
    font-size: 10px; font-weight: 600;
    color: var(--red); background: var(--red-bg);
    padding: 2px 6px; border-radius: 4px;
  }
  .tracked-untrack {
    align-self: flex-start;
    font-size: 10px; color: var(--text-muted);
    background: var(--surface-alt); border: none;
    border-radius: 6px; padding: 5px 10px;
    cursor: pointer; font-family: 'Inter', sans-serif;
    font-weight: 500; margin-top: 8px;
    transition: all 0.2s;
  }
  .tracked-untrack:active { background: var(--border); }

  /* ═══════ STAT TABS ═══════ */
  .stat-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-tab {
    padding: 7px 16px;
    border-radius: var(--radius-xl);
    font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer; transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .stat-tab.active { background: var(--charcoal); color: #fff; border-color: var(--charcoal); box-shadow: 0 4px 12px rgba(26,26,26,0.15); }

  /* ═══════ SOLD LIST ═══════ */
  .sold-item {
    display: flex; gap: 12px;
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 12px;
    margin-bottom: 8px;
    animation: fadeUp 0.35s ease both;
    cursor: pointer;
    transition: transform 0.2s;
    box-shadow: var(--shadow-card);
  }
  .sold-item:active { transform: scale(0.98); }
  .sold-img { width: 58px; height: 76px; object-fit: cover; border-radius: var(--radius-sm); background: var(--surface-alt); flex-shrink: 0; }
  .sold-info { flex: 1; min-width: 0; }
  .sold-brand { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--charcoal); }
  .sold-name { font-size: 10px; color: var(--text-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; }
  .sold-price-row { display: flex; align-items: baseline; gap: 6px; margin-top: 8px; }
  .sold-price { font-size: 14px; font-weight: 700; color: var(--charcoal); }
  .sold-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 400; }

  /* ═══════ EMPTY STATE ═══════ */
  .empty { text-align: center; padding: 60px 24px; }
  .empty-icon {
    width: 72px; height: 72px;
    margin: 0 auto 16px;
    background: var(--surface-alt);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .empty-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 500;
    color: var(--charcoal);
    margin-bottom: 8px;
  }
  .empty-text { font-size: 13px; line-height: 1.7; color: var(--text-secondary); font-weight: 300; }

  /* ═══════ LOADER ═══════ */
  .loader { display: flex; justify-content: center; padding: 40px; }
  .loader-dots { display: flex; gap: 6px; }
  .loader-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s infinite ease-in-out; }
  .loader-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* ═══════ TOAST ═══════ */
  .toast {
    position: fixed;
    bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 12px);
    left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--charcoal);
    color: #fff;
    padding: 12px 24px;
    border-radius: var(--radius-xl);
    font-size: 13px; font-weight: 500;
    z-index: 500;
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ═══════ SCROLL TOP ═══════ */
  .scroll-top-btn {
    position: fixed;
    bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 16px);
    right: 16px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-light);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 90;
    opacity: 0; transform: scale(0.8) translateY(8px);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    box-shadow: var(--shadow-md);
  }
  .scroll-top-btn.visible { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
  .scroll-top-btn:active { transform: scale(0.9); }

  /* ═══════ PULL REFRESH ═══════ */
  .pull-indicator {
    position: fixed; top: -44px; left: 50%; transform: translateX(-50%);
    width: 44px; height: 44px;
    border-radius: 50%; background: var(--surface);
    border: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    z-index: 300;
    transition: top 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: var(--shadow-md);
  }
  .pull-indicator.active { top: calc(var(--safe-top) + 60px); }
  .pull-indicator svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-inner">
    <div class="logo">TSUM <span>Outlet</span></div>
    <div class="header-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    </div>
  </div>
</div>

<!-- ═══ SEARCH ═══ -->
<div class="search-wrap">
  <div class="search-box">
    <svg class="s-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Бренд, категория или товар…" autocomplete="off">
    <button class="s-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- ═══ CATALOG ═══ -->
<div id="tab-catalog" class="screen active">
  <div class="section-title">Популярные <em>категории</em></div>
  <div class="chips" id="chips"></div>
  <div class="sort-bar">
    <span class="sort-label">Сорт.:</span>
    <button class="sort-btn active" onclick="setSort('default', this)">Все</button>
    <button class="sort-btn" onclick="setSort('price_asc', this)">Цена ↑</button>
    <button class="sort-btn" onclick="setSort('price_desc', this)">Цена ↓</button>
    <button class="sort-btn" onclick="setSort('discount', this)">Скидка %</button>
  </div>
  <div id="catalogGrid" class="grid"></div>
</div>

<!-- ═══ SEARCH RESULTS ═══ -->
<div id="tab-search" class="screen">
  <div id="searchResults">
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Найдите нужное</div>
      <p class="empty-text">Введите название бренда<br>или категории товара</p>
    </div>
  </div>
</div>

<!-- ═══ TRACKED ═══ -->
<div id="tab-tracked" class="screen">
  <div class="section-title">Избранное</div>
  <div id="trackedList"></div>
</div>

<!-- ═══ STATS ═══ -->
<div id="tab-stats" class="screen">
  <div class="section-title">Аналитика <em>товаров</em></div>
  <div id="statsTotal" class="section-subtitle"></div>
  <div class="stat-tabs">
    <button class="stat-tab active" onclick="showStatTab('discount', this)">Топ скидок</button>
    <button class="stat-tab" onclick="showStatTab('views', this)">Просмотры</button>
    <button class="stat-tab" onclick="showStatTab('clicks', this)">Клики</button>
    <button class="stat-tab" onclick="showStatTab('drops', this)">Снижение цен</button>
  </div>
  <div id="statsContent" class="grid"></div>
</div>

<!-- ═══ SOLD ═══ -->
<div id="tab-sold" class="screen">
  <div class="section-title">Продано <em>сегодня</em></div>
  <div id="soldMeta" class="section-subtitle"></div>
  <div id="soldList"></div>
</div>

<!-- ═══ COMING ═══ -->
<div id="tab-coming" class="screen">
  <div class="section-title">Ожидают <em>поступления</em></div>
  <div id="comingList" class="grid"></div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalSheet">
    <div class="modal-handle" id="modalDrag"><div class="modal-handle-bar"></div></div>
    <div class="modal-img-wrap">
      <img class="modal-img" id="modalImg" src="" alt="">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-brand" id="modalBrand"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-price-row">
        <span class="modal-price-new" id="modalPriceNew"></span>
        <span class="modal-price-old" id="modalPriceOld"></span>
        <span class="modal-discount-tag" id="modalDiscount" style="display:none"></span>
      </div>
      <div class="modal-avail" id="modalAvail">
        <span class="modal-avail-dot"></span>
        <span id="modalAvailText"></span>
      </div>
      <div class="modal-sizes" id="modalSizes" style="display:none">
        <div class="modal-sizes-label">Размеры</div>
        <div class="modal-sizes-list" id="modalSizesList"></div>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-actions">
        <a class="btn-primary" id="modalLink" href="#" target="_blank" onclick="trackEvent('click')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Открыть на сайте
        </a>
        <button class="btn-secondary" id="modalTrackBtn" onclick="toggleTrack()">
          <span id="modalTrackIcon">♡</span> В избранное
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('catalog', this)" data-tab="catalog">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Каталог</span>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="switchTab('tracked', this)" data-tab="tracked">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    <span>Избранное</span>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="switchTab('stats', this)" data-tab="stats">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Аналитика</span>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="switchTab('sold', this)" data-tab="sold">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span>Продажи</span>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="switchTab('coming', this)" data-tab="coming">

    <span>Скоро</span>
    <div class="nav-dot"></div>
  </button>
</nav>

<div class="toast" id="toast"></div>
<button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<div class="pull-indicator" id="pullIndicator">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 11-6.22-8.56"/><polyline points="21 3 21 9 15 9"/></svg>
</div>

<script>
const API = 'https://tsum-outlet-bot-production.up.railway.app';
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (tg.themeParams?.bg_color) document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
  if (tg.themeParams?.secondary_bg_color) document.documentElement.style.setProperty('--surface', tg.themeParams.secondary_bg_color);
}
const userId = tg?.initDataUnsafe?.user?.id || 0;

function haptic(type = 'light') {
  try { tg?.HapticFeedback?.impactOccurred(type); } catch(e) {}
}

let trackedUrls = new Set();
let currentProduct = null;
let searchTimeout = null;
let statsData = null;
let currentStatTab = 'discount';
let currentSort = 'default';
let lastCatalogResults = [];
let lastCatalogQuery = '';

const CATEGORIES = [
  { title: 'Ремни',     q: 'ремень' },
  { title: 'Сумки',     q: 'сумка' },
  { title: 'Обувь',     q: 'туфли' },
  { title: 'Одежда',    q: 'пальто' },
  { title: 'Кошельки',  q: 'кошелек' },
  { title: 'Кроссовки', q: 'кроссовки' },
  { title: 'Ювелирка',  q: 'кольцо' },
];

function fmt(n) { return Number(n).toLocaleString('ru-RU') + ' ₽'; }
function disc(old, nw) { return old > 0 ? Math.round((1 - nw / old) * 100) : 0; }
function timeAgo(ts) {
  const m = Math.floor((Date.now()/1000 - ts) / 60);
  if (m < 1) return 'только что';
  if (m < 60) return m + ' мин назад';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' ч назад';
  return Math.floor(h/24) + ' дн назад';
}

function skeletonLoader(count) {
  count = count || 4;
  let cards = '';
  for (let i = 0; i < count; i++) {
    cards += '<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line price"></div></div></div>';
  }
  return '<div class="skeleton-grid">' + cards + '</div>';
}

function loader() { return '<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div></div>'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2400);
}

// ── SORT ──
function sortItems(items, sort) {
  var sorted = items.slice();
  switch(sort) {
    case 'price_asc': return sorted.sort(function(a,b){ return (a.price||0) - (b.price||0); });
    case 'price_desc': return sorted.sort(function(a,b){ return (b.price||0) - (a.price||0); });
    case 'discount': return sorted.sort(function(a,b){ return disc(b.old_price, b.price) - disc(a.old_price, a.price); });
    default: return sorted;
  }
}

function setSort(sort, btn) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  haptic('light');
  if (lastCatalogResults.length) {
    renderGrid(document.getElementById('catalogGrid'), sortItems(lastCatalogResults, currentSort));
  }
}

// ── SEARCH ──
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  switchTab('catalog', document.querySelector('.nav-item[data-tab="catalog"]'));
}

// ── TABS ──
function switchTab(name, btn) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  haptic('light');
  if (name === 'tracked') loadTracked();
  if (name === 'stats') loadStats();
  if (name === 'sold') loadSold();
  if (name === 'coming') loadComing();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── CHIPS ──
function initChips() {
  var wrap = document.getElementById('chips');
  CATEGORIES.forEach(function(cat, i) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (i === 0 ? ' active' : '');
    btn.textContent = cat.title;
    btn.onclick = function() {
      document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
      btn.classList.add('active');
      haptic('light');
      loadCatalog(cat.q);
    };
    wrap.appendChild(btn);
  });
}

// ── EVENTS ──
function trackEvent(type) {
  if (!currentProduct) return;
  fetch(API + '/api/event', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ type: type, url: currentProduct.url, user_id: userId })
  }).catch(function(){});
}

function saveToCatalog(results) {
  if (!results || !results.length) return;
  fetch(API + '/api/catalog/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(results)
  }).catch(function(){});
}

// ── CATALOG ──
async function loadCatalog(q) {
  var grid = document.getElementById('catalogGrid');
  grid.innerHTML = '';
  var parent = grid.parentElement;
  var oldSkeleton = parent.querySelector('.skeleton-grid');
  if (oldSkeleton) oldSkeleton.remove();
  grid.insertAdjacentHTML('beforebegin', skeletonLoader(6));
  lastCatalogQuery = q;
  try {
    var res = await fetch(API + '/api/search?q=' + encodeURIComponent(q) + '&limit=20');
    var data = await res.json();
    var results = data.results || [];
    lastCatalogResults = results;
    var sk = parent.querySelector('.skeleton-grid');
    if (sk) sk.remove();
    renderGrid(grid, sortItems(results, currentSort));
    saveToCatalog(results);
    try { localStorage.setItem('cache_' + q, JSON.stringify(results)); } catch(e) {}
  } catch(e) {
    var sk2 = parent.querySelector('.skeleton-grid');
    if (sk2) sk2.remove();
    try {
      var cached = JSON.parse(localStorage.getItem('cache_' + q));
      if (cached && cached.length) {
        lastCatalogResults = cached;
        renderGrid(grid, sortItems(cached, currentSort));
        showToast('Показаны кешированные данные');
        return;
      }
    } catch(e2) {}
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><p class="empty-text">Не удалось загрузить товары</p></div>';
  }
}

// ── RENDER GRID ──
function renderGrid(container, items, opts) {
  opts = opts || {};
  if (!items.length) {
    container.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🛍️</div><div class="empty-title">Ничего не найдено</div></div>';
    return;
  }
  container.innerHTML = items.map(function(p, i) {
    var d = disc(p.old_price, p.price);
    var isTracked = trackedUrls.has(p.url);
    var heart = isTracked ? '♥' : '♡';
    var badge = '';
    if (p.coming_soon) badge = '<span class="badge badge-coming">Ожидается</span>';
    else if (opts.sold) badge = '<span class="badge badge-sold">Продан</span>';
    else if (d > 0) badge = '<span class="badge badge-sale">-' + d + '%</span>';
    var statsLine = opts.views ? '<div class="card-stats">👁 ' + (opts.views[p.url] || 0) + ' · 🔗 ' + ((opts.clicks && opts.clicks[p.url]) || 0) + '</div>' : '';
    var jsonEsc = JSON.stringify(JSON.stringify(p));
    return '<div class="card" style="animation-delay:' + (i*0.05) + 's" onclick=\'openModal(' + jsonEsc + ')\'>' +
      '<div class="card-img-wrap">' +
        '<div class="img-placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>' +
        '<img src="' + (p.image_url || '') + '" alt="' + p.brand + '" loading="lazy" onload="this.classList.add(\'loaded\')" onerror="this.style.display=\'none\'">' +
        badge +
        (!opts.sold ? '<button class="fav-btn ' + (isTracked ? 'is-tracked' : '') + '" onclick="event.stopPropagation();quickTrack(' + jsonEsc + ')" data-url="' + p.url + '">' + heart + '</button>' : '') +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-brand">' + p.brand + '</div>' +
        '<div class="card-name">' + p.name + '</div>' +
        '<div class="card-prices">' +
          '<span class="price-new">' + fmt(p.price || 0) + '</span>' +
          (p.old_price > p.price ? '<span class="price-old">' + fmt(p.old_price) + '</span>' : '') +
        '</div>' +
        statsLine +
      '</div>' +
    '</div>';
  }).join('');
}

// ── SEARCH INPUT ──
var searchInputEl = document.getElementById('searchInput');
var searchClearEl = document.getElementById('searchClear');

searchInputEl.addEventListener('input', function() {
  var q = this.value.trim();
  clearTimeout(searchTimeout);
  searchClearEl.classList.toggle('visible', q.length > 0);
  if (!q) return;
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-search').classList.add('active');
  document.getElementById('searchResults').innerHTML = skeletonLoader(4);
  searchTimeout = setTimeout(async function() {
    try {
      var res = await fetch(API + '/api/search?q=' + encodeURIComponent(q) + '&limit=20');
      var data = await res.json();
      var results = data.results || [];
      var wrap = document.getElementById('searchResults');
      wrap.innerHTML = '';
      if (results.length) {
        var ct = document.createElement('div');
        ct.className = 'result-count';
        ct.textContent = 'Найдено: ' + results.length + ' товаров';
        wrap.appendChild(ct);
      }
      var grid = document.createElement('div');
      grid.className = 'grid';
      wrap.appendChild(grid);
      renderGrid(grid, results);
      saveToCatalog(results);
    } catch(e) {
      document.getElementById('searchResults').innerHTML = '<div class="empty"><p class="empty-text">Ошибка поиска</p></div>';
    }
  }, 500);
});

// ── MODAL ──
function openModal(jsonStr) {
  var p = JSON.parse(jsonStr);
  currentProduct = p;
  var d = disc(p.old_price, p.price);
  document.getElementById('modalImg').src = p.image_url || '';
  document.getElementById('modalBrand').textContent = p.brand;
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalPriceNew').textContent = fmt(p.price || 0);
  document.getElementById('modalPriceOld').textContent = p.old_price > p.price ? fmt(p.old_price) : '';

  var discEl = document.getElementById('modalDiscount');
  if (d > 0) { discEl.textContent = '-' + d + '%'; discEl.style.display = ''; }
  else { discEl.style.display = 'none'; }

  document.getElementById('modalLink').href = p.url;

  var avail = document.getElementById('modalAvail');
  var availText = document.getElementById('modalAvailText');
  if (p.coming_soon) { availText.textContent = 'Ожидается поступление'; avail.className = 'modal-avail soon'; }
  else if (p.available === false) { availText.textContent = 'Нет в наличии'; avail.className = 'modal-avail no'; }
  else { availText.textContent = 'В наличии'; avail.className = 'modal-avail yes'; }

  var sizesWrap = document.getElementById('modalSizes');
  var sizesList = document.getElementById('modalSizesList');
  if (p.sizes && p.sizes.length) {
    sizesList.innerHTML = p.sizes.map(function(s){ return '<span class="size-tag">' + s + '</span>'; }).join('');
    sizesWrap.style.display = '';
  } else {
    sizesWrap.style.display = 'none';
  }

  updateTrackBtn();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (tg) tg.BackButton.show();
  haptic('medium');
  trackEvent('view');
}

function updateTrackBtn() {
  var btn = document.getElementById('modalTrackBtn');
  var icon = document.getElementById('modalTrackIcon');
  if (trackedUrls.has(currentProduct && currentProduct.url)) {
    icon.textContent = '♥';
    btn.lastChild.textContent = ' В избранном';
    btn.classList.add('tracked');
  } else {
    icon.textContent = '♡';
    btn.lastChild.textContent = ' В избранное';
    btn.classList.remove('tracked');
  }
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  if (tg) tg.BackButton.hide();
}
if (tg) tg.BackButton.onClick(closeModalDirect);

// ── SWIPE TO CLOSE ──
(function() {
  var drag = document.getElementById('modalDrag');
  var sheet = document.getElementById('modalSheet');
  var startY = 0, curY = 0, isDragging = false;

  drag.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    isDragging = true;
    sheet.style.transition = 'none';
  });

  document.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    curY = e.touches[0].clientY - startY;
    if (curY < 0) curY = 0;
    sheet.style.transform = 'translateY(' + curY + 'px)';
    sheet.style.opacity = Math.max(0.3, 1 - curY / 400);
  });

  document.addEventListener('touchend', function() {
    if (!isDragging) return;
    isDragging = false;
    sheet.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s';
    if (curY > 100) {
      closeModalDirect();
    }
    sheet.style.transform = '';
    sheet.style.opacity = '';
    curY = 0;
  });
})();

// ── TRACK ──
async function toggleTrack() {
  if (!currentProduct) return;
  var url = currentProduct.url;
  haptic('medium');
  if (trackedUrls.has(url)) {
    await fetch(API + '/api/untrack?user_id=' + userId + '&url=' + encodeURIComponent(url), {method:'POST'}).catch(function(){});
    trackedUrls.delete(url);
    showToast('Удалено из избранного');
  } else {
    await fetch(API + '/api/track?user_id=' + userId + '&url=' + encodeURIComponent(url), {method:'POST'}).catch(function(){});
    trackedUrls.add(url);
    showToast('Добавлено в избранное ♥');
    trackEvent('favorite');
  }
  updateTrackBtn();
  document.querySelectorAll('.fav-btn').forEach(function(b) {
    var t = trackedUrls.has(b.dataset.url);
    b.textContent = t ? '♥' : '♡';
    b.classList.toggle('is-tracked', t);
  });
}

async function quickTrack(jsonStr) {
  var p = JSON.parse(jsonStr); currentProduct = p;
  await toggleTrack(); currentProduct = null;
}

// ── TRACKED ──
async function loadTracked() {
  var list = document.getElementById('trackedList');
  list.innerHTML = loader();
  try {
    var res = await fetch(API + '/api/tracked/' + userId);
    var data = await res.json();
    var items = data.items || [];
    trackedUrls = new Set(items.map(function(i){ return i.url; }));
    if (!items.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">🤍</div><div class="empty-title">Список пуст</div><p class="empty-text">Добавляйте товары в избранное<br>чтобы следить за ценами</p></div>';
      return;
    }
    list.innerHTML = items.map(function(item, i) {
      var d = disc(item.old_price, item.price);
      var jsonEsc = JSON.stringify(JSON.stringify(item));
      return '<div class="tracked-item" style="animation-delay:' + (i*0.05) + 's" onclick=\'openModal(' + jsonEsc + ')\'>' +
        '<img class="tracked-img" src="' + (item.image_url||'') + '" alt="' + (item.brand||'') + '" onerror="this.style.opacity=0">' +
        '<div class="tracked-info">' +
          '<div class="tracked-brand">' + (item.brand||'') + '</div>' +
          '<div class="tracked-name">' + (item.name||'') + '</div>' +
          '<div class="tracked-prices">' +
            '<span class="tracked-price">' + fmt(item.price||0) + '</span>' +
            (item.old_price > item.price ? '<span class="tracked-old-price">' + fmt(item.old_price) + '</span>' : '') +
            (d > 0 ? '<span class="tracked-discount-tag">-' + d + '%</span>' : '') +
          '</div>' +
          '<button class="tracked-untrack" onclick="event.stopPropagation();untrackItem(\'' + item.url + '\',this)">Удалить</button>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty"><p class="empty-text">Не удалось загрузить</p></div>';
  }
}

async function untrackItem(url, btn) {
  haptic('medium');
  await fetch(API + '/api/untrack?user_id=' + userId + '&url=' + encodeURIComponent(url), {method:'POST'}).catch(function(){});
  trackedUrls.delete(url);
  var item = btn.closest('.tracked-item');
  item.style.transform = 'translateX(-100%)';
  item.style.opacity = '0';
  item.style.transition = 'all 0.35s cubic-bezier(0.16,1,0.3,1)';
  setTimeout(function() {
    item.remove();
    showToast('Удалено из избранного');
    if (!document.querySelectorAll('.tracked-item').length) loadTracked();
  }, 350);
}

// ── STATS ──
async function loadStats() {
  if (statsData) { renderStatTab(currentStatTab); return; }
  var container = document.getElementById('statsContent');
  container.innerHTML = '';
  container.insertAdjacentHTML('beforebegin', skeletonLoader(4));
  try {
    var res = await fetch(API + '/api/stats');
    statsData = await res.json();
    document.getElementById('statsTotal').textContent = 'Товаров в базе: ' + (statsData.total || 0);
    var sk = container.parentElement.querySelector('.skeleton-grid');
    if (sk) sk.remove();
    renderStatTab(currentStatTab);
  } catch(e) {
    var sk2 = container.parentElement.querySelector('.skeleton-grid');
    if (sk2) sk2.remove();
    container.innerHTML = '<div class="empty" style="grid-column:1/-1"><p class="empty-text">Ошибка загрузки</p></div>';
  }
}

function showStatTab(tab, btn) {
  currentStatTab = tab;
  document.querySelectorAll('.stat-tab').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  haptic('light');
  if (statsData) renderStatTab(tab);
}

function renderStatTab(tab) {
  var container = document.getElementById('statsContent');
  if (tab === 'discount') {
    renderGrid(container, statsData.top_discount || []);
  } else if (tab === 'views') {
    var items = (statsData.top_views || []).map(function(i){ return i.product; });
    var views = {};
    (statsData.top_views || []).forEach(function(i){ views[i.product.url] = i.views; });
    if (!items.length) {
      container.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👁</div><div class="empty-title">Пока нет данных</div><p class="empty-text">Просмотры появятся после<br>открытия карточек товаров</p></div>';
    } else {
      renderGrid(container, items, { views: views });
    }
  } else if (tab === 'clicks') {
    var citems = (statsData.top_clicks || []).map(function(i){ return i.product; });
    var clicks = {};
    (statsData.top_clicks || []).forEach(function(i){ clicks[i.product.url] = i.clicks; });
    if (!citems.length) {
      container.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔗</div><div class="empty-title">Пока нет данных</div><p class="empty-text">Клики появятся после<br>перехода на сайт</p></div>';
    } else {
      renderGrid(container, citems, { clicks: clicks });
    }
  } else if (tab === 'drops') {
    if (!(statsData.price_drops || []).length) {
      container.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📉</div><div class="empty-title">Пока нет данных</div><p class="empty-text">Снижения появятся<br>после нескольких проверок</p></div>';
    } else {
      renderGrid(container, statsData.price_drops);
    }
  }
}

// ── SOLD ──
async function loadSold() {
  var list = document.getElementById('soldList');
  list.innerHTML = loader();
  try {
    var res = await fetch(API + '/api/sold');
    var data = await res.json();
    var items = data.items || [];
    document.getElementById('soldMeta').textContent = 'Продано за 24 часа: ' + (data.count || 0) + ' товаров';
    if (!items.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">🏷</div><div class="empty-title">Нет данных</div><p class="empty-text">Проданные товары появятся<br>по мере накопления данных</p></div>';
      return;
    }
    list.innerHTML = items.reverse().map(function(s, i) {
      var p = s.product || {};
      var jsonEsc = JSON.stringify(JSON.stringify(p));
      return '<div class="sold-item" style="animation-delay:' + (i*0.04) + 's" onclick=\'openModal(' + jsonEsc + ')\'>' +
        '<img class="sold-img" src="' + (p.image_url||'') + '" alt="' + (p.brand||'') + '" onerror="this.style.opacity=0">' +
        '<div class="sold-info">' +
          '<div class="sold-brand">' + (p.brand||'—') + '</div>' +
          '<div class="sold-name">' + (p.name||'—') + '</div>' +
          '<div class="sold-price-row"><span class="sold-price">' + fmt(p.price||0) + '</span></div>' +
          '<div class="sold-time">' + timeAgo(s.ts) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty"><p class="empty-text">Ошибка загрузки</p></div>';
  }
}

// ── COMING ──
async function loadComing() {
  var grid = document.getElementById('comingList');
  grid.innerHTML = '';
  grid.insertAdjacentHTML('beforebegin', skeletonLoader(4));
  try {
    var res = await fetch(API + '/api/coming_soon');
    var data = await res.json();
    var items = data.items || [];
    var sk = grid.parentElement.querySelector('.skeleton-grid');
    if (sk) sk.remove();
    if (!items.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⏳</div><div class="empty-title">Список пуст</div><p class="empty-text">Товары в ожидании поступления<br>появятся здесь автоматически</p></div>';
      return;
    }
    renderGrid(grid, items);
  } catch(e) {
    var sk2 = grid.parentElement.querySelector('.skeleton-grid');
    if (sk2) sk2.remove();
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><p class="empty-text">Ошибка загрузки</p></div>';
  }
}

// ── SCROLL TOP ──
var scrollTopBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', function() {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); haptic('light'); }

// ── PULL TO REFRESH ──
(function() {
  var startY = 0, pulling = false;
  var indicator = document.getElementById('pullIndicator');

  document.addEventListener('touchstart', function(e) {
    if (window.scrollY === 0 && !document.getElementById('modalOverlay').classList.contains('open')) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 60) indicator.classList.add('active');
    else indicator.classList.remove('active');
  }, { passive: true });

  document.addEventListener('touchend', function() {
    if (!pulling) return;
    pulling = false;
    if (indicator.classList.contains('active')) {
      haptic('medium');
      var activeScreen = document.querySelector('.screen.active');
      if (activeScreen) {
        var id = activeScreen.id.replace('tab-', '');
        if (id === 'catalog') loadCatalog(lastCatalogQuery || CATEGORIES[0].q);
        else if (id === 'tracked') loadTracked();
        else if (id === 'stats') { statsData = null; loadStats(); }
        else if (id === 'sold') loadSold();
        else if (id === 'coming') loadComing();
      }
    }
    setTimeout(function(){ indicator.classList.remove('active'); }, 300);
  });
})();

// ── INIT ──
initChips();
loadCatalog(CATEGORIES[0].q);
if (userId) {
  fetch(API + '/api/tracked/' + userId).then(function(r){ return r.json(); }).then(function(d){ trackedUrls = new Set((d.items||[]).map(function(i){ return i.url; })); }).catch(function(){});
}
